name: Compile Language Files

on:
  push:
    paths:
      - 'languages/**.po'
  workflow_dispatch:

jobs:
  compile-languages:
    name: Compile .po to .mo and .l10n.php
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install gettext tools
        run: sudo apt-get install -y gettext

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: wp-cli

      - name: Compile .po files to .mo
        run: |
          find languages -name "*.po" | while read po_file; do
            mo_file="${po_file%.po}.mo"
            echo "Compiling $po_file -> $mo_file"
            msgfmt "$po_file" -o "$mo_file"
          done

      - name: Generate .l10n.php files via WP-CLI
        run: |
          find languages -name "*.po" | while read po_file; do
            php_file="${po_file%.po}.l10n.php"
            echo "Generating $php_file from $po_file"
            wp i18n make-php "$po_file" "$php_file" --allow-root
          done

      - name: Commit compiled files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add languages/*.mo languages/*.l10n.php
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-compile language files (.mo + .l10n.php) from .po"
            git push
          fi
