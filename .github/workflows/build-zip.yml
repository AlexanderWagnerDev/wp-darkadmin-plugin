name: Build Plugin ZIP

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    name: Build & package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep -m1 'Version:' wp-admin-dark-mode.php | awk '{print $NF}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected plugin version: $VERSION"

      - name: Create plugin ZIP
        run: |
          ZIP_NAME="wp-admin-dark-mode-${{ steps.version.outputs.VERSION }}.zip"

          # Use find to collect everything except .github/ and .git/
          # -not -path excludes the directory and all its contents
          # zip reads file list from stdin via -@
          find . \
            -not -path './.git/*' \
            -not -path './.git' \
            -not -path './.github/*' \
            -not -path './.github' \
            -not -name '*.zip' \
            -type f \
          | sed 's|^\./||' \
          | zip "$ZIP_NAME" -@

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

          # Show ZIP contents for verification
          echo "--- ZIP contents ---"
          unzip -l "$ZIP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-admin-dark-mode-${{ steps.version.outputs.VERSION }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 90

      - name: Upload ZIP to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
