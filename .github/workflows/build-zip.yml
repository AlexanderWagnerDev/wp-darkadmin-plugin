name: Build Plugin ZIP

# Triggers:
#   1. Every push to main        -> artifact only (downloadable for 90 days)
#   2. GitHub Release published  -> ZIP is attached to the release automatically
#   3. Manual run via Actions UI -> artifact only
on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    name: Build & package
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout                                                          #
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Read version from plugin header                                  #
      # ------------------------------------------------------------------ #
      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep -m1 'Version:' wp-admin-dark-mode.php | awk '{print $NF}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected plugin version: $VERSION"

      # ------------------------------------------------------------------ #
      # 3. Build ZIP - Dateien direkt im Root (kein Unterordner)            #
      #    WordPress erwartet: wp-admin-dark-mode.zip                       #
      #                        -> wp-admin-dark-mode.php                    #
      #                        -> assets/                                   #
      #                        -> languages/                                #
      #                        -> readme.txt                                #
      # ------------------------------------------------------------------ #
      - name: Create plugin ZIP
        run: |
          PLUGIN_SLUG="wp-admin-dark-mode"
          VERSION="${{ steps.version.outputs.VERSION }}"
          ZIP_NAME="${PLUGIN_SLUG}-${VERSION}.zip"

          # Collect only production files into a temp staging dir
          STAGING="/tmp/staging"
          mkdir -p "$STAGING"

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.editorconfig' \
            --exclude='*.md' \
            --exclude='*.zip' \
            --exclude='node_modules' \
            --exclude='tests' \
            ./ "$STAGING/"

          # readme.txt is included by rsync above (no --exclude)
          # Create ZIP from inside the staging dir so files are at root level
          cd "$STAGING"
          zip -r "$GITHUB_WORKSPACE/${ZIP_NAME}" .

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "Built: ${ZIP_NAME}"

      # ------------------------------------------------------------------ #
      # 4. Upload as workflow artifact (always)                             #
      #    -> Actions tab -> latest run -> Artifacts                        #
      # ------------------------------------------------------------------ #
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-admin-dark-mode-${{ steps.version.outputs.VERSION }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 90

      # ------------------------------------------------------------------ #
      # 5. Attach ZIP to GitHub Release (only on release event)             #
      # ------------------------------------------------------------------ #
      - name: Upload ZIP to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
