name: Build Plugin ZIP

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    name: Build & package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create plugin ZIP
        run: |
          ZIP_NAME="wp-admin-dark-mode.zip"

          find . \
            -not -path './.git/*' \
            -not -path './.git' \
            -not -path './.github/*' \
            -not -path './.github' \
            -not -name '*.zip' \
            -type f \
          | sed 's|^\./||' \
          | zip "$ZIP_NAME" -@

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

          echo "--- ZIP contents ---"
          unzip -l "$ZIP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wp-admin-dark-mode
          path: ${{ env.ZIP_NAME }}
          retention-days: 90

      - name: Upload ZIP to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
